
services:
  db:
    image: postgres:15-alpine
    container_name: hr-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-antigravity_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-antigravity_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hr_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@db:5432/${POSTGRES_DB:-antigravity_db}?schema=public
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-hr_system_secret_key_2026}
      - FRONTEND_URL=${FRONTEND_URL:-https://hr.swotpam.com}
      - CORS_ORIGIN=${FRONTEND_URL:-https://hr.swotpam.com}
    ports:
      - "8443:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hr_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    container_name: hr-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_BACKEND_URL=http://backend:4000
      - AUTH_SECRET=${AUTH_SECRET:-hr_system_secret_key_2026}
      - AUTH_TRUST_HOST=true
    ports:
      - "8080:3000"
    networks:
      - hr_network

networks:
  hr_network:
    driver: bridge

volumes:
  postgres_data:
