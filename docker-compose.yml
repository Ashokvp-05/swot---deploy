services:
  db:
    image: postgres:15-alpine
    container_name: hr-db
    restart: always
    environment:
      - POSTGRES_USER=hr_user
      - POSTGRES_PASSWORD=hr_password_123
      - POSTGRES_DB=hr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://hr_user:hr_password_123@db:5432/hr_db
      - PORT=4000
      - JWT_SECRET=your_jwt_secret_key_change_me
      # SSO & SMTP can be added here as needed
    ports:
      - "4000:4000"
    networks:
      - hr_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
    container_name: hr-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXTAUTH_URL=http://localhost:3000
      - AUTH_URL=http://localhost:3000
      - AUTH_SECRET=your_auth_secret_key_change_me
    ports:
      - "3000:3000"
    networks:
      - hr_network

networks:
  hr_network:
    driver: bridge

volumes:
  postgres_data:
